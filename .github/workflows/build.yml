name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore ShutdownTimer.csproj

      - name: Build
        run: dotnet build ShutdownTimer.csproj -c Release -r win-x64 --no-restore

      - name: Test
        run: dotnet test ShutdownTimer.Tests/ShutdownTimer.Tests.csproj -c Release --verbosity normal
